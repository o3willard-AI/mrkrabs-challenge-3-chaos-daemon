version: "3.8"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=testbed
      - POSTGRES_USER=testbed
      - POSTGRES_PASSWORD=testbed
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=testbed
      - POSTGRES_USER=testbed
      - POSTGRES_PASSWORD=testbed
    ports:
      - "5432:5432"
    restart: unless-stopped
